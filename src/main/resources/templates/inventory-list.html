<!doctype html>
<html xmlns:th="http://www.thymeleaf.org"
 xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
  <head th:replace="~{fragments/layout :: header}"></head>
  <body>
    <div th:replace="~{fragments/layout :: navbar}"></div>

    <div class="container mt-4">
      <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>Warehouse Inventory</h2>
       <a href="/inventory/add" class="btn btn-success"
   sec:authorize="hasAnyRole('ADMIN','STAFF')">+ Add New Product</a>
      </div>

      <form th:action="@{/inventory}" method="get" class="row g-3 mb-4">
        <div class="col-md-4">
          <input
            type="text"
            name="brand"
            class="form-control"
            placeholder="Search by Brand (e.g. Solace)"
          />
        </div>
        <div class="col-md-4">
          <select name="sortField" class="form-select">
            <option value="name">Sort by Name</option>
            <option value="price">Sort by Price</option>
            <option value="stock">Sort by Stock</option>
          </select>
        </div>
        <div class="col-md-2">
          <button type="submit" class="btn btn-primary w-100">Filter</button>
        </div>
      </form>

      <table class="table table-hover bg-white shadow-sm">
        <thead class="table-dark">
          <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Brand</th>
            <th>Price</th>
            <th>Stock</th>
            <th>Date Added</th>
          </tr>
        </thead>
        <tbody>
          <tr th:each="p : ${products}">
            <td th:text="${p.id}"></td>
            <td th:text="${p.name}"></td>
            <td th:text="${p.brand}"></td>
            <td th:text="${'$' + p.price}"></td>
            <td th:text="${p.stock}"></td>
            <td
              th:text="${#temporals.format(p.createdAt, 'yyyy-MM-dd HH:mm')}"
            ></td>
          </tr>
        </tbody>
      </table>
    </div>
  </body>
</html>

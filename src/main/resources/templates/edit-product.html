<!doctype html>
<html
  xmlns:th="http://www.thymeleaf.org"
  xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
>
  <head th:replace="~{fragments/layout :: header}"></head>
  <body>
    <div th:replace="~{fragments/layout :: navbar}"></div>

    <div class="container mt-4" style="max-width: 600px">
      <div class="card shadow">
        <div class="card-header bg-primary text-white">
          <h3 class="mb-0">Edit Warehouse Item</h3>
        </div>
        <div class="card-body">
          <form
            th:action="@{/inventory/update/{id}(id=${product.id})}"
            th:object="${product}"
            method="post"
          >
            <input type="hidden" th:field="*{id}" />
            <input type="hidden" th:field="*{createdAt}" />

            <div class="mb-3">
              <label class="form-label">Product Name</label>
              <input
                type="text"
                th:field="*{name}"
                class="form-control"
                th:errorclass="is-invalid"
              />
              <div
                class="invalid-feedback"
                th:if="${#fields.hasErrors('name')}"
                th:errors="*{name}"
              ></div>
            </div>

            <div class="mb-3">
              <label class="form-label">Brand</label>
              <input
                type="text"
                th:field="*{brand}"
                class="form-control"
                th:errorclass="is-invalid"
              />
              <div
                class="invalid-feedback"
                th:if="${#fields.hasErrors('brand')}"
                th:errors="*{brand}"
              ></div>
            </div>

            <div class="row">
              <div class="col-md-6 mb-3">
                <label class="form-label">Price ($)</label>
                <input
                  type="number"
                  step="0.01"
                  th:field="*{price}"
                  class="form-control"
                  th:errorclass="is-invalid"
                />
                <div
                  class="invalid-feedback"
                  th:if="${#fields.hasErrors('price')}"
                  th:errors="*{price}"
                ></div>
              </div>
              <div class="col-md-6 mb-3">
                <label class="form-label">Stock Quantity</label>
                <input
                  type="number"
                  th:field="*{stock}"
                  class="form-control"
                  th:errorclass="is-invalid"
                />
                <div
                  class="invalid-feedback"
                  th:if="${#fields.hasErrors('stock')}"
                  th:errors="*{stock}"
                ></div>
              </div>
            </div>

            <div class="mt-4">
              <button type="submit" class="btn btn-primary w-100">
                Update Product
              </button>
              <a
                href="/inventory"
                class="btn btn-link w-100 mt-2 text-muted text-decoration-none text-center d-block"
                >Cancel</a
              >
            </div>
          </form>
        </div>
      </div>
    </div>
  </body>
</html>

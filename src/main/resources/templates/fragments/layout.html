<!doctype html>
<html
  xmlns:th="http://www.thymeleaf.org"
  xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
>
  <head th:fragment="header">
    <meta charset="UTF-8" />
    <title>Solace Atelier | WarehouseOS</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <style>
      body {
        padding-top: 80px;
        background-color: #f8f9fa;
      }
      .navbar-brand {
        font-weight: bold;
        letter-spacing: 1px;
      }
      .user-info {
        color: rgba(255, 255, 255, 0.75);
        font-size: 0.9rem;
      }
      .confirm-delete-text {
        white-space:normal;
        word-wrap: break-word;
        overflow-wrap:break-word;
        max-width: 100%;
      }

      .table-responsive {
        position: relative;
        z-index: 1;
      }

      .modal{
        z-index: 1055 !important;
      }
    </style>
  </head>
  <body>
    <nav
      th:fragment="navbar"
      class="navbar navbar-expand-lg navbar-dark bg-dark fixed-top"
    >
      <div class="container">
        <a class="navbar-brand" href="/">SOLACE ATELIER</a>

        <div class="collapse navbar-collapse justify-content-end">
          <div class="navbar-nav align-items-center">
            <a class="nav-link" href="/">Home</a>
            <a class="nav-link" href="/inventory">Inventory</a>
            <a class="nav-link" href="/about">About</a>
            <a class="nav-link" href="/locations">Locations</a>

            <a class="nav-link" href="/register" sec:authorize="isAnonymous()"
              >Register</a
            >
            <a class="nav-link" href="/login" sec:authorize="isAnonymous()"
              >Login</a
            >

            <a
              class="nav-link"
              href="/inventory/add"
              sec:authorize="hasAnyRole('ADMIN','STAFF')"
              >Add Product</a
            >

            <span
              class="navbar-text mx-3 user-info"
              sec:authorize="isAuthenticated()"
            >
              ID:
              <strong class="text-white" sec:authentication="name">User</strong>
              <span
                class="badge bg-secondary ms-1"
                sec:authentication="principal.authorities"
                >Roles</span
              >
            </span>

            <form
              th:action="@{/logout}"
              method="post"
              class="d-inline"
              sec:authorize="isAuthenticated()"
            >
              <button type="submit" class="btn btn-outline-light btn-sm ms-2">
                Logout
              </button>
            </form>
          </div>
        </div>
      </div>
    </nav>
    <div th:fragment="scripts">
      <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    </div>
  </body>
</html>

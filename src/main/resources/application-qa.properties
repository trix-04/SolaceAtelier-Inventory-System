# MySQL datasource
spring.datasource.url=jdbc:mysql://mysql-db:3306/solaceatelier_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=appuser
spring.datasource.password=apppassword

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# H2 console disabled in QA
spring.h2.console.enabled=false

# Do not run data.sql against MySQL (avoids duplicates and dialect issues)
spring.sql.init.mode=never
